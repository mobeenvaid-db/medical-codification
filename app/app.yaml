command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"
env:
  - name: DATA_MODE
    description: "lakebase or warehouse — determines data source"
    value: "lakebase"
  - name: CATALOG
    description: "Unity Catalog name"
    value: "mv_catalog"
  - name: WAREHOUSE_ID
    description: "SQL Warehouse ID for Delta table reads (v2 pipeline)"
    value: "**your SQL Warehouse ID**"
